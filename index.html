<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
       <h1> My To-Do List</h1>
       <p class="subtitle">Stay Productive and Organized</p>

       <div class="filters">
       <button id="allBtn">All</button>
       <button id="activeBtn">Active</button>
       <button id="completedBtn">Completed</button>
       <p id="taskCount">0 tasks</p>
    </div>

    <button id="clearBtn">Clear All Tasks</button>
    
       <div class="input-section">
        <input type="text" id="taskInput" placeholder="Input a Task">
        <button id="addBtn">Add</button>
        <p id="successMessage" class="success-message"></p>
       </div>
       <ul id="taskList"></ul>
       <p id="emptyMessage">
        No tasks yet. Add one to get started!
       </p>
    </div>
    
    <script type="module" src="JS/main.js"></script>
</body>
</html>
