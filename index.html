<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
       <h1> My To-Do List</h1>
       <p>Stay Productive and Organized</p>
       <div class="input-section">
        <input type="text" placeholder="Input a Task">
        <button>Add</button>
       </div>
       <ul class="task-list">
          <li class="completed">Complete Day 24 Coding and Writing</li>
          <li>Read My Book</li>
          <li>Complete my task for the day</li>
          <li>Check my schedule and plan for the next day</li>
       </ul>
       <div class="empty-state">
        <p> No task yet</p>
        <p>Add a task to get started</p>
       </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
